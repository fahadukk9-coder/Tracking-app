<!DOCTYPE html>
<html>
<head>
  <title>Generate Link</title>
</head>
<body>

<h2>Generate Link</h2>

<input type="text" id="text" placeholder="Enter any text">
<button onclick="generateLink()">Generate</button>

<p id="result"></p>

<script>
function generateLink() {
  const id = Math.random().toString(36).substring(7);

  // ✅ clean normal link
  const link = window.location.origin + "/watch.html?id=" + id;

  // ✅ clickable link show karega
  document.getElementById("result").innerHTML =
    '<a href="' + link + '" target="_blank">' + link + '</a>';
}
</script>

</body>
</html>
